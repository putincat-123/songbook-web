<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>歌单查询</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand2: #1d4ed8;
      --soft: #eff6ff;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 34%, #ffffff 100%);
      color: var(--text);
    }
    .app { max-width: 900px; margin: 0 auto; padding: 18px 16px 40px; }
    .hero {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
    }
    .eyebrow { margin: 0 0 8px; color: var(--brand); font-size: 12px; letter-spacing: 0.14em; font-weight: 900; }
    h1 { margin: 0; font-size: 30px; line-height: 1.2; letter-spacing: -0.04em; }
    .desc { margin: 10px 0 0; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
    .stat { background: var(--soft); border-radius: 16px; padding: 12px; text-align: center; }
    .stat .value { font-size: 22px; font-weight: 900; color: var(--brand); }
    .stat .label { margin-top: 2px; font-size: 12px; color: var(--muted); font-weight: 700; }
    .toolbar {
      position: sticky; top: 0; z-index: 10;
      margin: 0 -16px 14px; padding: 12px 16px;
      background: rgba(246, 248, 251, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.8);
    }
    .search-box { display: flex; gap: 8px; align-items: center; }
    input {
      width: 100%; border: 1px solid var(--line); background: #fff; color: var(--text);
      border-radius: 16px; padding: 13px 14px; font-size: 15px; outline: none;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }
    input:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.28); }
    button { border: none; border-radius: 16px; padding: 13px 14px; font-size: 14px; font-weight: 900; cursor: pointer; white-space: nowrap; }
    .primary { background: var(--brand); color: #fff; }
    .primary:hover { background: var(--brand2); }
    .ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .hint { margin: 8px 2px 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .result-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 10px 2px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .list { display: grid; gap: 10px; }
    .song-card {
      display: grid; grid-template-columns: 54px 1fr; gap: 12px; align-items: center;
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05); padding: 12px;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .song-card.highlight-card { border-color: #60a5fa; box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18), 0 8px 24px rgba(15, 23, 42, 0.08); transform: translateY(-1px); }
    .seq { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 16px; background: #f1f5f9; color: #64748b; font-size: 13px; font-weight: 900; }
    .song-name { font-size: 16px; font-weight: 900; line-height: 1.35; word-break: break-word; }
    .artist { margin-top: 4px; color: var(--muted); font-size: 13px; word-break: break-word; }
    mark { background: #fef3c7; color: inherit; padding: 0 2px; border-radius: 4px; }
    .empty, .loading, .error { background: #fff; border: 1px dashed var(--line); border-radius: 20px; padding: 28px 16px; text-align: center; color: var(--muted); line-height: 1.7; }
    .error { color: #b91c1c; background: #fef2f2; border-color: #fecaca; }
    .footer { margin-top: 24px; text-align: center; color: var(--muted); font-size: 12px; }
    @media (max-width: 560px) {
      .app { padding: 14px 12px 32px; }
      .hero { padding: 18px; border-radius: 24px; }
      h1 { font-size: 26px; }
      .stats { grid-template-columns: repeat(3, 1fr); }
      .stat { padding: 10px 6px; }
      .stat .value { font-size: 18px; }
      .search-box { align-items: stretch; }
      button { padding: 13px 12px; }
      .song-card { grid-template-columns: 48px 1fr; }
      .seq { width: 44px; height: 44px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow" id="eyebrow">SONGBOOK</p>
      <h1 id="title">歌单查询</h1>
      <p class="desc" id="desc">输入歌名或歌手即可查询。适合直播间点歌前快速确认曲库。</p>
      <div class="stats">
        <div class="stat"><div class="value" id="totalCount">--</div><div class="label">收录歌曲</div></div>
        <div class="stat"><div class="value" id="resultCount">--</div><div class="label">当前显示</div></div>
        <div class="stat"><div class="value" id="artistCount">--</div><div class="label">歌手数</div></div>
      </div>
    </section>

    <section class="toolbar">
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="搜歌名 / 歌手，例如：晴天、薛之谦、爱你" autocomplete="off" />
        <button class="ghost" id="clearBtn" type="button">清空</button>
        <button class="primary" id="randomBtn" type="button">随机</button>
      </div>
      <div class="hint" id="jsonHint">正在读取歌单 JSON...</div>
    </section>

    <div class="result-head">
      <span id="resultText">载入中...</span>
      <span id="keywordText"></span>
    </div>

    <section id="list" class="list">
      <div class="loading">正在载入歌单...</div>
    </section>

    <div class="footer">Made for songbook · 数据来自 JSON</div>
  </main>

  <script>
    const STREAMER_CONFIG = {
      miyu: { title: "谜屿歌单查询", eyebrow: "MIYU SONGBOOK", desc: "当前歌单：谜屿 · 输入歌名或歌手即可查询" },
      other: { title: "主播歌单查询", eyebrow: "SONGBOOK", desc: "当前歌单：other · 输入歌名或歌手即可查询" }
    };

    const params = new URLSearchParams(window.location.search);
    const streamer = params.get("streamer") || "miyu";
    const JSON_PATH = `./${streamer}.json`;

    const MAX_INITIAL = 80;
    const MAX_SEARCH = 300;

    const $ = (id) => document.getElementById(id);
    const searchInput = $("searchInput");
    const list = $("list");
    const totalCount = $("totalCount");
    const resultCount = $("resultCount");
    const artistCount = $("artistCount");
    const resultText = $("resultText");
    const keywordText = $("keywordText");

    let songs = [];
    let currentResults = [];
    let lastRandomId = null;

    function normalizeText(value) {
      return String(value ?? "").toLowerCase().normalize("NFKC").replace(/[\s\u3000]+/g, "").trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function highlight(text, keyword) {
      const safe = escapeHtml(text || "");
      const raw = String(keyword || "").trim();
      if (!raw) return safe;
      const escapedKeyword = raw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(`(${escapedKeyword})`, "gi"), "<mark>$1</mark>");
    }

    function unwrapJson(data) {
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.songs)) return data.songs;
      if (data && Array.isArray(data.data)) return data.data;
      return [];
    }

    function normalizeSong(item, index) {
      const name = String(item.name ?? item.songName ?? "").trim();
      const artist = item.artist == null ? "" : String(item.artist).trim();
      const seq = Number.isFinite(Number(item.seq)) ? Number(item.seq) : index + 1;
      if (!name) return null;
      const id = String(item.id ?? `song_${index}_${seq}`);
      return { id, seq, name, artist, version: item.version ?? null, searchKey: normalizeText(`${name} ${artist} ${item.version ?? ""}`) };
    }

    function applyStreamerUi() {
      const config = STREAMER_CONFIG[streamer] || { title: "歌单查询", eyebrow: "SONGBOOK", desc: `当前歌单：${streamer} · 输入歌名或歌手即可查询` };
      document.title = config.title;
      $("title").textContent = config.title;
      $("eyebrow").textContent = config.eyebrow;
      $("desc").textContent = config.desc;
      $("jsonHint").innerHTML = `正在读取：<b>${escapeHtml(JSON_PATH)}</b>`;
    }

    async function loadSongs() {
      applyStreamerUi();
      try {
        const res = await fetch(JSON_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const raw = unwrapJson(data);

        songs = raw.map(normalizeSong).filter(Boolean).sort((a, b) => {
          if (a.seq !== b.seq) return a.seq - b.seq;
          return a.name.localeCompare(b.name, "zh-Hans-CN");
        });

        const artists = new Set(songs.map((s) => s.artist).filter(Boolean));
        totalCount.textContent = songs.length;
        artistCount.textContent = artists.size;
        $("jsonHint").innerHTML = `已载入：<b>${escapeHtml(JSON_PATH)}</b>`;
        render();
      } catch (error) {
        console.error("loadSongs failed:", error);
        totalCount.textContent = "0";
        resultCount.textContent = "0";
        artistCount.textContent = "0";
        resultText.textContent = "载入失败";
        keywordText.textContent = "";
        list.innerHTML = `<div class="error">歌单载入失败。<br>请确认 <b>${escapeHtml(JSON_PATH)}</b> 与 index.html 放在同一层，并且 JSON 格式正确。<br>你也可以直接打开 <b>${escapeHtml(JSON_PATH)}</b> 检查是否为 404。</div>`;
      }
    }

    function getFilteredSongs() {
      const keyword = searchInput.value.trim();
      const key = normalizeText(keyword);
      if (!key) return songs.slice(0, MAX_INITIAL);
      return songs.filter((song) => song.searchKey.includes(key)).slice(0, MAX_SEARCH);
    }

    function render() {
      const keyword = searchInput.value.trim();
      currentResults = getFilteredSongs();
      resultCount.textContent = currentResults.length;
      keywordText.textContent = keyword ? `关键词：${keyword}` : "";

      if (!songs.length) {
        list.innerHTML = `<div class="empty">目前没有歌曲资料。</div>`;
        resultText.textContent = "暂无资料";
        return;
      }

      if (!currentResults.length) {
        list.innerHTML = `<div class="empty">找不到符合的歌曲，可以换歌名或歌手试试。</div>`;
        resultText.textContent = "没有找到结果";
        return;
      }

      resultText.textContent = keyword ? `找到 ${currentResults.length} 首相关歌曲` : `预览前 ${Math.min(MAX_INITIAL, songs.length)} 首歌曲`;

      list.innerHTML = currentResults.map((song) => `
        <article class="song-card ${song.id === lastRandomId ? "highlight-card" : ""}" id="song-${escapeHtml(song.id)}">
          <div class="seq">${escapeHtml(song.seq)}</div>
          <div>
            <div class="song-name">${highlight(song.name, keyword)}</div>
            <div class="artist">${highlight(song.artist || "未知歌手", keyword)}</div>
          </div>
        </article>
      `).join("");
    }

    function drawRandomSong() {
      if (!songs.length) return;
      const song = songs[Math.floor(Math.random() * songs.length)];
      lastRandomId = song.id;
      searchInput.value = "";
      render();
      setTimeout(() => {
        const card = document.getElementById(`song-${song.id}`);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 50);
    }

    searchInput.addEventListener("input", () => {
      lastRandomId = null;
      render();
    });

    $("clearBtn").addEventListener("click", () => {
      searchInput.value = "";
      lastRandomId = null;
      render();
      searchInput.focus();
    });

    $("randomBtn").addEventListener("click", drawRandomSong);
    loadSongs();
  </script>
</body>
</html>
