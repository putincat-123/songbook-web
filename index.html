<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>歌单查询</title>
  <style>
    :root {
      --card:#ffffff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --brand:#2563eb; --brand2:#1d4ed8; --soft:#eff6ff;
      --shadow:0 8px 24px rgba(15,23,42,.08); --radius:18px;
    }
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#eff6ff 0%,#f8fafc 34%,#fff 100%);
      color:var(--text);
    }
    .app { max-width:900px; margin:0 auto; padding:18px 16px 40px; }
    .hero {
      background:rgba(255,255,255,.9); border:1px solid var(--line); border-radius:28px;
      box-shadow:var(--shadow); padding:22px; margin-bottom:14px; backdrop-filter:blur(10px);
    }
    .eyebrow { margin:0 0 8px; color:var(--brand); font-size:12px; letter-spacing:.14em; font-weight:900; }
    h1 { margin:0; font-size:30px; line-height:1.2; letter-spacing:-.04em; }
    .desc { margin:10px 0 0; color:var(--muted); font-size:14px; line-height:1.7; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px; }
    .stat { background:var(--soft); border-radius:16px; padding:12px; text-align:center; }
    .stat .value { font-size:22px; font-weight:900; color:var(--brand); }
    .stat .label { margin-top:2px; font-size:12px; color:var(--muted); font-weight:700; }
    .toolbar {
      position:sticky; top:0; z-index:10; margin:0 -16px 14px; padding:12px 16px;
      background:rgba(246,248,251,.94); backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(229,231,235,.8);
    }
    .search-box { display:flex; gap:8px; align-items:center; }
    input {
      width:100%; min-width:0; border:1px solid var(--line); background:#fff; color:var(--text);
      border-radius:16px; padding:13px 14px; font-size:15px; outline:none;
      box-shadow:0 2px 10px rgba(15,23,42,.04);
    }
    input:focus { border-color:#93c5fd; box-shadow:0 0 0 4px rgba(147,197,253,.28); }
    button {
      border:none; border-radius:16px; padding:13px 14px; font-size:14px; font-weight:900;
      cursor:pointer; white-space:nowrap;
    }
    .primary { background:var(--brand); color:#fff; }
    .primary:hover { background:var(--brand2); }
    .ghost { background:#fff; color:var(--text); border:1px solid var(--line); }
    .hint { margin:8px 2px 0; color:var(--muted); font-size:12px; line-height:1.5; }
    .filter-title {
      margin:10px 2px 0;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
    }
    .filters {
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding:8px 2px 0;
      -webkit-overflow-scrolling:touch;
    }
    .filter-btn {
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      flex:0 0 auto;
    }
    .filter-btn.active {
      background:var(--brand);
      color:#fff;
      border-color:var(--brand);
    }
    .random-result {
      margin-top:10px; background:#fff; border:1px solid #bfdbfe; border-radius:18px;
      padding:14px 16px; box-shadow:0 4px 14px rgba(15,23,42,.05);
    }
    .random-label { font-size:12px; font-weight:900; color:var(--brand); margin-bottom:6px; }
    .random-song { font-size:20px; font-weight:900; line-height:1.4; }
    .random-artist { margin-top:4px; font-size:14px; color:var(--muted); }
    .result-head {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin:10px 2px; color:var(--muted); font-size:13px; font-weight:800;
    }
    .pagination { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 14px; }
    .page-btn {
      background:#fff; color:var(--text); border:1px solid var(--line);
      padding:8px 12px; border-radius:999px; font-size:13px;
    }
    .page-btn.active { background:var(--brand); color:#fff; border-color:var(--brand); }
    .list { display:grid; gap:10px; }
    .song-card {
      display:grid; grid-template-columns:54px 1fr; gap:12px; align-items:center;
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      box-shadow:0 4px 14px rgba(15,23,42,.05); padding:12px;
    }
    .seq {
      width:48px; height:48px; display:flex; align-items:center; justify-content:center;
      border-radius:16px; background:#f1f5f9; color:#64748b; font-size:13px; font-weight:900;
    }
    .song-name { font-size:16px; font-weight:900; line-height:1.35; word-break:break-word; }
    .artist { margin-top:4px; color:var(--muted); font-size:13px; word-break:break-word; }

    .artist-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-top:4px;
    }
    .artist-row .artist {
      margin-top:0;
      min-width:0;
      flex:1;
    }
    .song-tags {
      margin-top:6px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }
    .song-tag {
      font-size:12px;
      color:#0284c7;
      background:#e0f2fe;
      border-radius:999px;
      padding:3px 8px;
    }
    .copy-btn {
      flex-shrink:0;
      border:1px solid #bae6fd;
      background:#f0f9ff;
      color:#0284c7;
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:800;
    }
    .copy-btn:hover {
      background:#e0f2fe;
    }
    mark { background:#fef3c7; color:inherit; padding:0 2px; border-radius:4px; }
    .empty,.loading,.error {
      background:#fff; border:1px dashed var(--line); border-radius:20px; padding:28px 16px;
      text-align:center; color:var(--muted); line-height:1.7;
    }
    .error { color:#b91c1c; background:#fef2f2; border-color:#fecaca; }
    .footer { margin-top:24px; text-align:center; color:var(--muted); font-size:12px; }
    @media (max-width:560px) {
      .app { padding:14px 12px 32px; }
      .hero { padding:18px; border-radius:24px; }
      h1 { font-size:26px; }
      .stats { grid-template-columns:repeat(3,1fr); }
      .stat { padding:10px 6px; }
      .stat .value { font-size:18px; }
      .toolbar { margin:0 -12px 14px; padding:10px 12px; }
      .search-box { display:grid; grid-template-columns:1fr auto auto; gap:8px; }
      button { padding:13px 12px; }
      .song-card { grid-template-columns:48px 1fr; }
      .seq { width:44px; height:44px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow" id="eyebrow">SONGBOOK</p>
      <h1 id="title">歌单查询</h1>
      <p class="desc" id="desc">输入歌名或歌手即可查询。适合直播间点歌前快速确认曲库。</p>
      <div class="stats">
        <div class="stat"><div class="value" id="totalCount">--</div><div class="label">收录歌曲</div></div>
        <div class="stat"><div class="value" id="resultCount">--</div><div class="label">当前结果</div></div>
        <div class="stat"><div class="value" id="artistCount">--</div><div class="label">歌手数</div></div>
      </div>
    </section>

    <section class="toolbar">
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="搜歌名 / 歌手，例如：晴天、薛之谦、爱你" autocomplete="off" />
        <button class="ghost" id="clearBtn" type="button">清空</button>
        <button class="primary" id="randomBtn" type="button">随机</button>
      </div>

      <div class="hint" id="jsonHint">正在读取歌单 JSON...</div>

      <div class="filter-title">曲风筛选</div>
      <div id="styleFilters" class="filters"></div>

      <div id="randomResult" class="random-result" style="display:none;"></div>
    </section>

    <div class="result-head">
      <span id="resultText">载入中...</span>
      <span id="keywordText"></span>
    </div>

    <div id="pagination" class="pagination"></div>

    <section id="list" class="list">
      <div class="loading">正在载入歌单...</div>
    </section>

    <div class="footer">Made for songbook · 数据来自 JSON</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

  <script>
    const STREAMER_CONFIG = {
      miyu: { title: "谜屿歌单查询", eyebrow: "MIYU SONGBOOK", desc: "当前歌单：谜屿 · 输入歌名或歌手即可查询" },
      xingxing: { title: "星星歌单查询", eyebrow: "XINGXING SONGBOOK", desc: "当前歌单：星星 · 输入歌名或歌手即可查询" },
      other: { title: "主播歌单查询", eyebrow: "SONGBOOK", desc: "当前歌单：other · 输入歌名或歌手即可查询" }
    };

    const params = new URLSearchParams(window.location.search);
    const streamer = params.get("streamer") || "miyu";
    const JSON_PATH = "./" + streamer + ".json";

    const PAGE_SIZE = 100;
    const MAX_SEARCH = 300;

    const $ = (id) => document.getElementById(id);

    const searchInput = $("searchInput");
    const list = $("list");
    const totalCount = $("totalCount");
    const resultCount = $("resultCount");
    const artistCount = $("artistCount");
    const resultText = $("resultText");
    const keywordText = $("keywordText");
    const pagination = $("pagination");
    const randomResult = $("randomResult");

    let songs = [];
    let currentPage = 1;
    let selectedStyle = params.get("style") || "全部";

    const S2T_CHAR_MAP = {
      "爱":"愛","碍":"礙","暗":"暗","罢":"罷","摆":"擺","办":"辦","帮":"幫","宝":"寶","报":"報","备":"備","贝":"貝","笔":"筆","毕":"畢","边":"邊","变":"變","别":"別","宾":"賓","冰":"冰","并":"並","补":"補","才":"才","参":"參","残":"殘","藏":"藏","层":"層","缠":"纏","产":"產","长":"長","场":"場","尝":"嘗","车":"車","尘":"塵","陈":"陳","称":"稱","成":"成","迟":"遲","齿":"齒","冲":"衝","丑":"醜","出":"出","处":"處","传":"傳","创":"創","从":"從","错":"錯","达":"達","带":"帶","单":"單","当":"當","挡":"擋","党":"黨","灯":"燈","邓":"鄧","点":"點","电":"電","淀":"澱","东":"東","动":"動","冻":"凍","独":"獨","断":"斷","对":"對","队":"隊","儿":"兒","发":"發","范":"範","飞":"飛","风":"風","凤":"鳳","复":"復","盖":"蓋","干":"乾","赶":"趕","个":"個","给":"給","宫":"宮","够":"夠","关":"關","观":"觀","广":"廣","归":"歸","过":"過","还":"還","汉":"漢","号":"號","合":"合","后":"後","护":"護","华":"華","画":"畫","怀":"懷","坏":"壞","欢":"歡","黄":"黃","会":"會","汇":"匯","几":"幾","记":"記","际":"際","继":"繼","家":"家","价":"價","见":"見","将":"將","讲":"講","杰":"傑","尽":"盡","进":"進","经":"經","旧":"舊","觉":"覺","开":"開","来":"來","蓝":"藍","乐":"樂","泪":"淚","类":"類","离":"離","里":"裡","礼":"禮","丽":"麗","连":"連","恋":"戀","两":"兩","亮":"亮","灵":"靈","刘":"劉","龙":"龍","楼":"樓","录":"錄","乱":"亂","伦":"倫","吗":"嗎","买":"買","卖":"賣","满":"滿","么":"麼","门":"門","梦":"夢","弥":"彌","面":"麵","庙":"廟","灭":"滅","鸣":"鳴","谋":"謀","难":"難","脑":"腦","内":"內","你":"你","宁":"寧","诺":"諾","盘":"盤","鹏":"鵬","凭":"憑","气":"氣","千":"千","迁":"遷","牵":"牽","浅":"淺","强":"強","桥":"橋","亲":"親","轻":"輕","清":"清","庆":"慶","穷":"窮","秋":"秋","权":"權","让":"讓","热":"熱","认":"認","荣":"榮","软":"軟","润":"潤","若":"若","伤":"傷","声":"聲","圣":"聖","胜":"勝","时":"時","实":"實","识":"識","势":"勢","适":"適","释":"釋","书":"書","术":"術","树":"樹","帅":"帥","双":"雙","谁":"誰","说":"說","丝":"絲","苏":"蘇","随":"隨","孙":"孫","台":"台","态":"態","谈":"談","汤":"湯","体":"體","条":"條","听":"聽","头":"頭","图":"圖","团":"團","万":"萬","网":"網","为":"為","伟":"偉","温":"溫","问":"問","我":"我","无":"無","雾":"霧","习":"習","戏":"戲","细":"細","虾":"蝦","吓":"嚇","闲":"閒","现":"現","乡":"鄉","响":"響","想":"想","向":"向","萧":"蕭","晓":"曉","写":"寫","谢":"謝","心":"心","兴":"興","须":"須","许":"許","学":"學","雪":"雪","寻":"尋","压":"壓","亚":"亞","严":"嚴","颜":"顏","阳":"陽","样":"樣","摇":"搖","遥":"遙","药":"藥","爷":"爺","叶":"葉","页":"頁","业":"業","医":"醫","亿":"億","忆":"憶","义":"義","艺":"藝","阴":"陰","应":"應","拥":"擁","优":"優","忧":"憂","游":"遊","鱼":"魚","语":"語","郁":"鬱","园":"園","圆":"圓","远":"遠","愿":"願","约":"約","跃":"躍","云":"雲","杂":"雜","赞":"讚","脏":"髒","张":"張","赵":"趙","这":"這","着":"著","真":"真","阵":"陣","郑":"鄭","只":"只","钟":"鍾","种":"種","众":"眾","周":"周","猪":"豬","转":"轉","庄":"莊","装":"裝","准":"準","总":"總","纵":"縱","组":"組","钻":"鑽"
    };

    const T2S_CHAR_MAP = Object.fromEntries(
      Object.entries(S2T_CHAR_MAP).map(([s, t]) => [t, s])
    );

    function normalizeText(value) {
      return String(value == null ? "" : value)
        .toLowerCase()
        .normalize("NFKC")
        .replace(/[\s\u3000]+/g, "")
        .trim();
    }

    function convertByMap(text, map) {
      return Array.from(text).map((char) => map[char] || char).join("");
    }

    const hasOpenCC = window.OpenCC && typeof OpenCC.Converter === "function";
    const openccToTraditional = hasOpenCC ? OpenCC.Converter({ from: "cn", to: "tw" }) : null;
    const openccToSimplified = hasOpenCC ? OpenCC.Converter({ from: "tw", to: "cn" }) : null;

    function toTraditionalText(value) {
      const text = normalizeText(value);
      if (!text) return "";
      try {
        return normalizeText(openccToTraditional ? openccToTraditional(text) : convertByMap(text, S2T_CHAR_MAP));
      } catch (error) {
        return normalizeText(convertByMap(text, S2T_CHAR_MAP));
      }
    }

    function toSimplifiedText(value) {
      const text = normalizeText(value);
      if (!text) return "";
      try {
        return normalizeText(openccToSimplified ? openccToSimplified(text) : convertByMap(text, T2S_CHAR_MAP));
      } catch (error) {
        return normalizeText(convertByMap(text, T2S_CHAR_MAP));
      }
    }

    function getSearchVariants(value) {
      const base = normalizeText(value);
      if (!base) return [];
      return Array.from(new Set([
        base,
        toTraditionalText(base),
        toSimplifiedText(base)
      ].filter(Boolean)));
    }

    function buildSearchKey(value) {
      return getSearchVariants(value).join(" ");
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("已复制：" + text);
      } catch (error) {
        console.error("copy failed:", error);
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        alert("已复制：" + text);
      }
    }

    function highlight(text, keyword) {
      const safe = escapeHtml(text || "");
      const raw = String(keyword || "").trim();
      if (!raw) return safe;
      const escapedKeyword = raw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp("(" + escapedKeyword + ")", "gi"), "<mark>$1</mark>");
    }

    function unwrapJson(data) {
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.songs)) return data.songs;
      if (data && Array.isArray(data.data)) return data.data;
      return [];
    }

    function normalizeSong(item, index) {
      const name = String(item.name || item.songName || "").trim();
      const artist = item.artist == null ? "" : String(item.artist).trim();
      const seq = Number.isFinite(Number(item.seq)) ? Number(item.seq) : index + 1;

      if (!name) return null;

      const id = String(item.id || ("song_" + index + "_" + seq));
      const style = item.style ? String(item.style).trim() : "";
      const remarks = item.remarks ? String(item.remarks).trim() : "";

      return {
        id,
        seq,
        name,
        artist,
        style,
        remarks,
        version: item.version || null,
        searchKey: buildSearchKey(name + " " + artist + " " + style + " " + remarks + " " + (item.version || ""))
      };
    }

    function parseStyles(style) {
      if (!style) return [];

      return String(style)
        .split(",") // 只拆逗號，不拆 /
        .map((s) => s.trim())
        .filter(Boolean);
    }

    function applyStreamerUi() {
      const config = STREAMER_CONFIG[streamer] || {
        title: "歌单查询",
        eyebrow: "SONGBOOK",
        desc: "当前歌单：" + streamer + " · 输入歌名或歌手即可查询"
      };

      document.title = config.title;
      $("title").textContent = config.title;
      $("eyebrow").textContent = config.eyebrow;
      $("desc").textContent = config.desc;
      $("jsonHint").innerHTML = "正在读取：<b>" + escapeHtml(JSON_PATH) + "</b>";
    }

    async function loadSongs() {
      applyStreamerUi();

      let raw = [];

      try {
        const res = await fetch(JSON_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        raw = unwrapJson(data);
      } catch (error) {
        console.error("loadSongs failed:", error);
        totalCount.textContent = "0";
        resultCount.textContent = "0";
        artistCount.textContent = "0";
        resultText.textContent = "载入失败";
        keywordText.textContent = "";
        pagination.innerHTML = "";
        list.innerHTML =
          '<div class="error">歌单载入失败。<br>请确认 <b>' +
          escapeHtml(JSON_PATH) +
          '</b> 与 index.html 放在同一层，并且 JSON 格式正确。<br>你也可以直接打开 <b>' +
          escapeHtml(JSON_PATH) +
          '</b> 检查是否为 404。</div>';
        return;
      }

      songs = raw
        .map(normalizeSong)
        .filter(Boolean)
        .sort((a, b) => {
          if (a.seq !== b.seq) return a.seq - b.seq;
          return a.name.localeCompare(b.name, "zh-Hans-CN");
        });

      const artists = new Set(songs.map((song) => song.artist).filter(Boolean));

      totalCount.textContent = songs.length;
      artistCount.textContent = artists.size;
      searchInput.value = params.get("q") || "";
      $("jsonHint").innerHTML = "已载入：<b>" + escapeHtml(JSON_PATH) + "</b>";

      render();
    }

    function getStyleOptions() {
      return [
        "全部",
        ...Array.from(
          new Set(
            songs.flatMap((s) => parseStyles(s.style))
          )
        ).sort((a, b) => a.localeCompare(b, "zh-Hans-CN"))
      ];
    }

    function syncUrl() {
      const url = new URL(window.location.href);
      const keyword = searchInput.value.trim();

      url.searchParams.set("streamer", streamer);

      if (keyword) {
        url.searchParams.set("q", keyword);
      } else {
        url.searchParams.delete("q");
      }

      if (selectedStyle !== "全部") {
        url.searchParams.set("style", selectedStyle);
      } else {
        url.searchParams.delete("style");
      }

      window.history.replaceState({}, "", url.toString());
    }

    function renderStyleFilters() {
      const container = $("styleFilters");
      const styles = getStyleOptions();

      container.innerHTML = styles.map((style) =>
        '<button type="button" class="filter-btn ' +
        (style === selectedStyle ? "active" : "") +
        '" data-style="' + escapeHtml(style) + '">' +
        escapeHtml(style) +
        '</button>'
      ).join("");

      container.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          selectedStyle = btn.dataset.style || "全部";
          currentPage = 1;
          randomResult.style.display = "none";
          randomResult.innerHTML = "";
          syncUrl();
          render();
        });
      });
    }

    function getAllResults() {
      const keyword = searchInput.value.trim();
      const keys = getSearchVariants(keyword);

      let results = songs;

      if (selectedStyle !== "全部") {
        results = results.filter((song) =>
          parseStyles(song.style).includes(selectedStyle)
        );
      }

      if (keys.length) {
        results = results.filter((song) =>
          keys.some((key) => song.searchKey.includes(key))
        );
      }

      return keys.length ? results.slice(0, MAX_SEARCH) : results;
    }

    function renderPagination(total, keyword) {
      if (keyword || total <= PAGE_SIZE) {
        pagination.innerHTML = "";
        return;
      }

      const totalPages = Math.ceil(total / PAGE_SIZE);

      pagination.innerHTML = Array.from({ length: totalPages }, (_, i) => {
        const page = i + 1;
        return '<button type="button" class="page-btn ' +
          (page === currentPage ? "active" : "") +
          '" data-page="' + page + '">' + page + '</button>';
      }).join("");

      pagination.querySelectorAll(".page-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentPage = Number(btn.dataset.page);
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function render() {
      renderStyleFilters();

      const keyword = searchInput.value.trim();
      const allResults = getAllResults();
      const totalPages = Math.max(1, Math.ceil(allResults.length / PAGE_SIZE));

      if (currentPage > totalPages) currentPage = totalPages;

      const start = keyword ? 0 : (currentPage - 1) * PAGE_SIZE;
      const end = keyword ? allResults.length : start + PAGE_SIZE;
      const pageResults = allResults.slice(start, end);

      resultCount.textContent = allResults.length;

      const activeTexts = [];
      if (selectedStyle !== "全部") activeTexts.push("曲风：" + selectedStyle);
      if (keyword) activeTexts.push("关键词：" + keyword);
      keywordText.textContent = activeTexts.join("｜");

      if (!songs.length) {
        pagination.innerHTML = "";
        list.innerHTML = '<div class="empty">目前没有歌曲资料。</div>';
        resultText.textContent = "暂无资料";
        return;
      }

      if (!pageResults.length) {
        pagination.innerHTML = "";
        list.innerHTML = '<div class="empty">找不到符合的歌曲，可以换歌名、歌手或曲风试试。</div>';
        resultText.textContent = "没有找到结果";
        return;
      }

      resultText.textContent = keyword
        ? "找到 " + allResults.length + " 首相关歌曲"
        : "第 " + currentPage + " 页 / 共 " + totalPages + " 页";

      renderPagination(allResults.length, keyword);

      list.innerHTML = pageResults.map((song) => (
        '<article class="song-card" id="song-' + escapeHtml(song.id) + '">' +
          '<div class="seq">' + escapeHtml(song.seq) + '</div>' +
          '<div>' +
            '<div class="song-name">' + highlight(song.name, keyword) + '</div>' +
            '<div class="artist-row">' +
              '<div class="artist">' + highlight(song.artist || "未知歌手", keyword) + '</div>' +
              '<button type="button" class="copy-btn" data-copy="' +
                escapeAttr("点歌 " + song.name) +
              '">复制</button>' +
            '</div>' +
            
            '<div class="song-tags">' +
              parseStyles(song.style).map((style) => '<span class="song-tag">' + escapeHtml(style) + '</span>').join('') +
            '</div>' +
          '</div>' +
        '</article>'
      )).join("");

      list.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          copyText(btn.dataset.copy || "");
        });
      });
    }

    function drawRandomSong() {
      const pool = getAllResults();

      if (!pool.length) {
        randomResult.style.display = "block";
        randomResult.innerHTML =
          '<div class="random-label">🎲 随机抽歌</div>' +
          '<div class="random-artist">目前条件下没有可随机的歌曲</div>';
        return;
      }

      const song = pool[Math.floor(Math.random() * pool.length)];

      randomResult.style.display = "block";
      randomResult.innerHTML =
        '<div class="random-label">🎲 随机抽中</div>' +
        '<div class="random-song">' + escapeHtml(song.name) + '</div>' +
        '<div class="random-artist">' +
          escapeHtml(song.artist || "未知歌手") +
          (song.style ? " · " + escapeHtml(song.style) : "") +
        '</div>';
    }

    searchInput.addEventListener("input", () => {
      currentPage = 1;
      randomResult.style.display = "none";
      randomResult.innerHTML = "";
      syncUrl();
      render();
    });

    $("clearBtn").addEventListener("click", () => {
      searchInput.value = "";
      selectedStyle = "全部";
      currentPage = 1;
      randomResult.style.display = "none";
      randomResult.innerHTML = "";
      syncUrl();
      render();
      searchInput.focus();
    });

    $("randomBtn").addEventListener("click", drawRandomSong);

    loadSongs();
  </script>
</body>
</html>
