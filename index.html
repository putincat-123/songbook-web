<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>歌单查询</title>
  <style>
    :root {
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#2563eb;
      --brand2:#1d4ed8;
      --soft:#eff6ff;
      --shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:18px;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      overflow-x: hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#eff6ff 0%,#f8fafc 34%,#fff 100%);
      color:var(--text);
    }

    .app {
      max-width:900px;
      margin:0 auto;
      padding:18px 16px 40px;
    }

    .hero {
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:14px;
      backdrop-filter:blur(10px);
    }

    .eyebrow {
      margin:0 0 8px;
      color:var(--brand);
      font-size:12px;
      letter-spacing:.14em;
      font-weight:900;
    }

    h1 {
      margin:0;
      font-size:30px;
      line-height:1.2;
      letter-spacing:-.04em;
    }

    .desc {
      margin:10px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .live-link {
      display:inline-flex;
      margin-top:14px;
      border-radius:999px;
      background:var(--brand);
      color:#fff;
      padding:9px 14px;
      font-size:13px;
      font-weight:900;
      text-decoration:none;
      align-items:center;
      gap:6px;
    }

    .live-link:hover { background:var(--brand2); }

    .stats {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:16px;
    }

    .stat {
      background:var(--soft);
      border-radius:16px;
      padding:12px;
      text-align:center;
    }

    .stat .value {
      font-size:22px;
      font-weight:900;
      color:var(--brand);
    }

    .stat .label {
      margin-top:2px;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .toolbar {
      position:sticky;
      top:0;
      z-index:10;
      margin:0 -16px 14px;
      padding:12px 16px;
      background:rgba(246,248,251,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(229,231,235,.8);
    }

    .search-box {
      display:flex;
      gap:8px;
      align-items:center;
    }

    input {
      width:100%;
      min-width:0;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:13px 14px;
      font-size:15px;
      outline:none;
      box-shadow:0 2px 10px rgba(15,23,42,.04);
    }

    input:focus {
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(147,197,253,.28);
    }

    button {
      border:none;
      border-radius:16px;
      padding:13px 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
    }

    .primary {
      background:var(--brand);
      color:#fff;
    }

    .primary:hover { background:var(--brand2); }

    .ghost {
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .hint {
      display: none;
    }

    .filter-title {
      margin:10px 2px 0;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
    }

    .filters {
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding:8px 2px 0;
      -webkit-overflow-scrolling:touch;
    }

    .filter-btn {
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      flex:0 0 auto;
    }

    .filter-btn.active {
      background:var(--brand);
      color:#fff;
      border-color:var(--brand);
    }

    .random-result {
      margin-top:12px;
      background:linear-gradient(135deg,#eff6ff 0%,#ffffff 70%);
      border:1px solid #bfdbfe;
      border-radius:20px;
      padding:14px 16px;
      box-shadow:0 6px 18px rgba(37,99,235,.10);
    }

    .random-label {
      font-size:12px;
      font-weight:900;
      color:var(--brand);
      margin-bottom:6px;
    }

    .random-song {
      font-size:21px;
      font-weight:900;
      line-height:1.4;
    }

    .random-artist {
      margin-top:4px;
      font-size:14px;
      color:var(--muted);
    }

    .result-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:10px 2px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
    }

    .pagination {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:10px 0 14px;
    }

    .page-btn {
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
    }

    .page-btn.active {
      background:var(--brand);
      color:#fff;
      border-color:var(--brand);
    }

    .list {
      display:grid;
      gap:10px;
    }

    .song-card {
      display:grid;
      grid-template-columns:54px 1fr;
      gap:12px;
      align-items:center;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 4px 14px rgba(15,23,42,.05);
      padding:12px;
    }

    .seq {
      width:48px;
      height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:16px;
      background:#f1f5f9;
      color:#64748b;
      font-size:13px;
      font-weight:900;
    }

    .song-name {
      font-size:16px;
      font-weight:900;
      line-height:1.35;
      word-break:break-word;
    }

    .artist-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-top:4px;
    }

    .artist {
      margin-top:0;
      color:var(--muted);
      font-size:13px;
      word-break:break-word;
      min-width:0;
      flex:1;
    }

    .song-tags {
      margin-top:6px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .song-tag {
      font-size:12px;
      color:#0284c7;
      background:#e0f2fe;
      border-radius:999px;
      padding:3px 8px;
    }

    .copy-btn {
      flex-shrink:0;
      border:1px solid #bae6fd;
      background:#f0f9ff;
      color:#0284c7;
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:800;
    }

    .copy-btn:hover { background:#e0f2fe; }

    mark {
      background:#fef3c7;
      color:inherit;
      padding:0 2px;
      border-radius:4px;
    }

    .empty,
    .loading,
    .error {
      background:#fff;
      border:1px dashed var(--line);
      border-radius:20px;
      padding:28px 16px;
      text-align:center;
      color:var(--muted);
      line-height:1.7;
    }

    .error {
      color:#b91c1c;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .footer {
      margin-top:24px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
    }

    .section-divider {
      margin: 14px 0 6px;
      height: 1px;
      background: linear-gradient(to right, transparent, #e5e7eb, transparent);
    }
    
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(16px);
      z-index: 9999;
      max-width: calc(100vw - 32px);
      background: rgba(15, 23, 42, .92);
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: all .24s ease;
      box-shadow: 0 10px 28px rgba(15,23,42,.24);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width:560px) {
      .app {
        padding:14px 12px 32px;
      }

      .hero {
        padding:18px;
        border-radius:24px;
      }

      h1 { font-size:26px; }

      .stats { grid-template-columns:repeat(3,1fr); }

      .stat { padding:10px 6px; }

      .stat .value { font-size:18px; }

      .toolbar {
        margin:0 0 14px;
        padding:10px 12px;
      }

      .search-box {
        display:grid;
        grid-template-columns:1fr auto auto;
        gap:8px;
      }

      button { padding:13px 12px; }

      .song-card { grid-template-columns:48px 1fr; }

      .seq {
        width:44px;
        height:44px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow" id="eyebrow">SONGBOOK</p>
      <h1 id="title">歌单查询</h1>
      <p class="desc" id="desc">输入歌名或歌手即可查询。适合直播间点歌前快速确认曲库。</p>
      <a id="liveLink" class="live-link" href="#" target="_blank" rel="noopener">进入直播间</a>

      <div class="stats">
        <div class="stat">
          <div class="value" id="totalCount">--</div>
          <div class="label">收录歌曲</div>
        </div>
        <div class="stat">
          <div class="value" id="resultCount">--</div>
          <div class="label">当前结果</div>
        </div>
        <div class="stat">
          <div class="value" id="artistCount">--</div>
          <div class="label">歌手数</div>
        </div>
      </div>
    </section>

    <section class="toolbar">
  <div class="search-box">
    <input id="searchInput" type="search" placeholder="搜歌名 / 歌手，例如：晴天、薛之谦、爱你" autocomplete="off" />
    <button class="ghost" id="clearBtn" type="button">清空</button>
    <button class="primary" id="randomBtn" type="button">随机</button>
  </div>

  <div class="hint" id="jsonHint">正在读取歌单 JSON...</div>

  <div id="randomResult" class="random-result" style="display:none;"></div>

  <div class="section-divider"></div>

  <div class="filter-title">曲风筛选</div>
  <div id="styleFilters" class="filters"></div>
</section>

    <div class="result-head">
      <span id="resultText">载入中...</span>
      <span id="keywordText"></span>
    </div>

    <div id="pagination" class="pagination"></div>

    <section id="list" class="list">
      <div class="loading">正在载入歌单...</div>
    </section>

    <div class="footer">Made for songbook · 数据来自 JSON</div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

  <script>
    const STREAMER_CONFIG = {
      miyu: {
        title: "谜屿歌单查询",
        eyebrow: "MIYU SONGBOOK",
        desc: "当前歌单：谜屿 · 输入歌名或歌手即可查询",
        liveUrl: "https://fm.missevan.com/live/868878322"
      },
      xingxing: {
        title: "星谣歌单查询",
        eyebrow: "XINGXING SONGBOOK",
        desc: "当前歌单：星谣 · 输入歌名或歌手即可查询",
        liveUrl: "https://fm.missevan.com/live/869031646"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const streamer = (params.get("streamer") || "").toLowerCase();
    const JSON_PATH = streamer ? "./data/" + streamer + "/songs.json" : "";
    const PAGE_SIZE = 100;
    const MAX_SEARCH = 300;

    const $ = (id) => document.getElementById(id);

    const searchInput = $("searchInput");
    const list = $("list");
    const totalCount = $("totalCount");
    const resultCount = $("resultCount");
    const artistCount = $("artistCount");
    const resultText = $("resultText");
    const keywordText = $("keywordText");
    const pagination = $("pagination");
    const randomResult = $("randomResult");

    let songs = [];
    let currentPage = 1;
    let selectedStyle = params.get("style") || "全部";

    const hasOpenCC = window.OpenCC && typeof OpenCC.Converter === "function";
    const openccToTraditional = hasOpenCC ? OpenCC.Converter({ from: "cn", to: "tw" }) : null;
    const openccToSimplified = hasOpenCC ? OpenCC.Converter({ from: "tw", to: "cn" }) : null;

    function normalizeText(value) {
      return String(value == null ? "" : value)
        .toLowerCase()
        .normalize("NFKC")
        .replace(/[\s\u3000]+/g, "")
        .trim();
    }

    function toTraditionalText(value) {
      const text = normalizeText(value);
      if (!text) return "";
      if (!openccToTraditional) return text;

      try {
        return normalizeText(openccToTraditional(text));
      } catch (error) {
        return text;
      }
    }

    function toSimplifiedText(value) {
      const text = normalizeText(value);
      if (!text) return "";
      if (!openccToSimplified) return text;

      try {
        return normalizeText(openccToSimplified(text));
      } catch (error) {
        return text;
      }
    }

    function getSearchVariants(value) {
      const base = normalizeText(value);
      if (!base) return [];
      return Array.from(new Set([
        base,
        toTraditionalText(base),
        toSimplifiedText(base)
      ].filter(Boolean)));
    }

    function buildSearchKey(value) {
      return getSearchVariants(value).join(" ");
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ");
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1600);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("✅ 已复制：" + text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showToast("✅ 已复制：" + text);
      }
    }

    function highlight(text, keyword) {
      const safe = escapeHtml(text || "");
      const raw = String(keyword || "").trim();
      if (!raw) return safe;
      const escapedKeyword = raw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp("(" + escapedKeyword + ")", "gi"), "<mark>$1</mark>");
    }

    function unwrapJson(data) {
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.songs)) return data.songs;
      if (data && Array.isArray(data.data)) return data.data;
      return [];
    }

    function normalizeSong(item, index) {
      const name = String(item.name || item.songName || "").trim();
      const artist = item.artist == null ? "" : String(item.artist).trim();
      const seq = Number.isFinite(Number(item.seq)) ? Number(item.seq) : index + 1;

      if (!name) return null;

      const id = String(item.id || ("song_" + index + "_" + seq));
      const style = item.style ? String(item.style).trim() : "";
      const remarks = item.remarks ? String(item.remarks).trim() : "";
      const version = item.version || null;

      return {
        id,
        seq,
        name,
        artist,
        style,
        remarks,
        version,
        searchKey: buildSearchKey(name + " " + artist + " " + style + " " + remarks + " " + (version || ""))
      };
    }

    function parseStyles(style) {
      if (!style) return [];

      return String(style)
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean);
    }

    function applyStreamerUi() {
      const config = STREAMER_CONFIG[streamer] || {
        title: "歌单查询",
        eyebrow: "SONGBOOK",
        desc: "当前歌单：" + streamer + " · 输入歌名或歌手即可查询",
        liveUrl: ""
      };

      document.title = config.title;
      $("title").textContent = config.title;
      $("eyebrow").textContent = config.eyebrow;
      $("desc").textContent = config.desc;
      $("jsonHint").innerHTML = "正在读取：<b>" + escapeHtml(JSON_PATH) + "</b>";

      const liveLink = $("liveLink");

      if (config.liveUrl) {
        liveLink.href = config.liveUrl;
        liveLink.target = "_blank";
        liveLink.rel = "noopener";
        liveLink.style.display = "inline-flex";
      } else {
        liveLink.href = "#";
        liveLink.style.display = "none";
      }
    }

    async function loadSongs() {
      if (!streamer) {
        document.title = "主播歌单";
        $("title").textContent = "主播歌单";
        $("desc").textContent = "请使用主播专属链接进入歌单";
        $("liveLink").style.display = "none";
        $("jsonHint").innerHTML = "";
        totalCount.textContent = "--";
        resultCount.textContent = "--";
        artistCount.textContent = "--";
        resultText.textContent = "请选择主播";
        keywordText.textContent = "";
        pagination.innerHTML = "";
        list.innerHTML = '<div class="empty">请通过主播专属链接进入歌单</div>';
        return;
      }

      applyStreamerUi();

      let raw = [];

      try {
        const res = await fetch(JSON_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        raw = unwrapJson(data);
      } catch (error) {
        console.error("loadSongs failed:", error);
        totalCount.textContent = "0";
        resultCount.textContent = "0";
        artistCount.textContent = "0";
        resultText.textContent = "载入失败";
        keywordText.textContent = "";
        pagination.innerHTML = "";
        list.innerHTML =
          '<div class="error">歌单载入失败。<br>请确认 <b>' +
          escapeHtml(JSON_PATH) +
          '</b> 与 index.html 放在同一层，并且 JSON 格式正确。<br>你也可以直接打开 <b>' +
          escapeHtml(JSON_PATH) +
          '</b> 检查是否为 404。</div>';
        return;
      }

      songs = raw
        .map(normalizeSong)
        .filter(Boolean)
        .sort((a, b) => {
          if (a.seq !== b.seq) return a.seq - b.seq;
          return a.name.localeCompare(b.name, "zh-Hans-CN");
        });

      const artists = new Set(songs.map((song) => song.artist).filter(Boolean));

      totalCount.textContent = songs.length;
      artistCount.textContent = artists.size;
      searchInput.value = params.get("q") || "";
      $("jsonHint").innerHTML = "已载入：<b>" + escapeHtml(JSON_PATH) + "</b>";

      render();
    }

    function getStyleOptions() {
      return [
        "全部",
        ...Array.from(
          new Set(
            songs.flatMap((song) => parseStyles(song.style))
          )
        ).sort((a, b) => a.localeCompare(b, "zh-Hans-CN"))
      ];
    }

    function syncUrl() {
      const url = new URL(window.location.href);
      const keyword = searchInput.value.trim();

      url.searchParams.set("streamer", streamer);

      if (keyword) {
        url.searchParams.set("q", keyword);
      } else {
        url.searchParams.delete("q");
      }

      if (selectedStyle !== "全部") {
        url.searchParams.set("style", selectedStyle);
      } else {
        url.searchParams.delete("style");
      }

      window.history.replaceState({}, "", url.toString());
    }

    function renderStyleFilters() {
      const container = $("styleFilters");
      const styles = getStyleOptions();

      if (!styles.includes(selectedStyle)) {
        selectedStyle = "全部";
      }

      container.innerHTML = styles.map((style) =>
        '<button type="button" class="filter-btn ' +
        (style === selectedStyle ? "active" : "") +
        '" data-style="' + escapeAttr(style) + '">' +
        escapeHtml(style) +
        '</button>'
      ).join("");

      container.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          selectedStyle = btn.dataset.style || "全部";
          currentPage = 1;
          randomResult.style.display = "none";
          randomResult.innerHTML = "";
          syncUrl();
          render();
        });
      });
    }

    function getAllResults() {
      const keyword = searchInput.value.trim();
      const keys = getSearchVariants(keyword);

      let results = songs;

      if (selectedStyle !== "全部") {
        results = results.filter((song) =>
          parseStyles(song.style).includes(selectedStyle)
        );
      }

      if (keys.length) {
        results = results.filter((song) =>
          keys.some((key) => song.searchKey.includes(key))
        );
      }

      return keys.length ? results.slice(0, MAX_SEARCH) : results;
    }

    function renderPagination(total, keyword) {
      if (keyword || total <= PAGE_SIZE) {
        pagination.innerHTML = "";
        return;
      }

      const totalPages = Math.ceil(total / PAGE_SIZE);

      pagination.innerHTML = Array.from({ length: totalPages }, (_, i) => {
        const page = i + 1;
        return '<button type="button" class="page-btn ' +
          (page === currentPage ? "active" : "") +
          '" data-page="' + page + '">' + page + '</button>';
      }).join("");

      pagination.querySelectorAll(".page-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentPage = Number(btn.dataset.page);
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function render() {
      renderStyleFilters();

      const keyword = searchInput.value.trim();
      const allResults = getAllResults();
      const totalPages = Math.max(1, Math.ceil(allResults.length / PAGE_SIZE));

      if (currentPage > totalPages) currentPage = totalPages;

      const start = keyword ? 0 : (currentPage - 1) * PAGE_SIZE;
      const end = keyword ? allResults.length : start + PAGE_SIZE;
      const pageResults = allResults.slice(start, end);

      resultCount.textContent = allResults.length;

      const activeTexts = [];
      if (selectedStyle !== "全部") activeTexts.push("曲风：" + selectedStyle);
      if (keyword) activeTexts.push("关键词：" + keyword);
      keywordText.textContent = activeTexts.join("｜");

      if (!songs.length) {
        pagination.innerHTML = "";
        list.innerHTML = '<div class="empty">目前没有歌曲资料。</div>';
        resultText.textContent = "暂无资料";
        return;
      }

      if (!pageResults.length) {
        pagination.innerHTML = "";
        list.innerHTML = '<div class="empty">找不到符合的歌曲，可以换歌名、歌手或曲风试试。</div>';
        resultText.textContent = "没有找到结果";
        return;
      }

      resultText.textContent = keyword
        ? "找到 " + allResults.length + " 首相关歌曲"
        : "第 " + currentPage + " 页 / 共 " + totalPages + " 页";

      renderPagination(allResults.length, keyword);

      list.innerHTML = pageResults.map((song) => (
        '<article class="song-card" id="song-' + escapeAttr(song.id) + '">' +
          '<div class="seq">' + escapeHtml(song.seq) + '</div>' +
          '<div>' +
            '<div class="song-name">' + highlight(song.name, keyword) + '</div>' +
            '<div class="artist-row">' +
              '<div class="artist">' + highlight(song.artist || "未知歌手", keyword) + '</div>' +
              '<button type="button" class="copy-btn" data-copy="' +
                escapeAttr("点歌 " + song.name) +
              '">复制</button>' +
            '</div>' +
            '<div class="song-tags">' +
              parseStyles(song.style).map((style) => '<span class="song-tag">' + escapeHtml(style) + '</span>').join("") +
            '</div>' +
          '</div>' +
        '</article>'
      )).join("");

      list.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          copyText(btn.dataset.copy || "");
        });
      });
    }

    function drawRandomSong() {
      const pool = getAllResults();

      if (!pool.length) {
        randomResult.style.display = "block";
        randomResult.innerHTML =
          '<div class="random-label">🎲 随机推荐</div>' +
          '<div class="random-artist">目前条件下没有可随机的歌曲</div>';
        return;
      }

      const song = pool[Math.floor(Math.random() * pool.length)];

      randomResult.style.display = "block";
      randomResult.innerHTML =
        '<div class="artist-row">' +
          '<div>' +
            '<div class="random-label">🎲 随机推荐</div>' +
            '<div class="random-song">' + escapeHtml(song.name) + '</div>' +
            '<div class="random-artist">' +
              escapeHtml(song.artist || "未知歌手") +
              (song.style ? " · " + escapeHtml(song.style) : "") +
            '</div>' +
          '</div>' +
          '<button type="button" class="copy-btn" data-copy="' +
            escapeAttr("点歌 " + song.name) +
          '">复制</button>' +
        '</div>';

      randomResult.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          copyText(btn.dataset.copy || "");
        });
      });
    }

    searchInput.addEventListener("input", () => {
      currentPage = 1;
      randomResult.style.display = "none";
      randomResult.innerHTML = "";
      syncUrl();
      render();
    });

    $("clearBtn").addEventListener("click", () => {
      searchInput.value = "";
      selectedStyle = "全部";
      currentPage = 1;
      randomResult.style.display = "none";
      randomResult.innerHTML = "";
      syncUrl();
      render();
      searchInput.focus();
    });

    $("randomBtn").addEventListener("click", drawRandomSong);

    loadSongs();
  </script>
</body>
</html>
