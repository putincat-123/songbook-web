name: Update QQ Hot

on:
  workflow_dispatch:

  schedule:
    - cron: '0 22 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        run: node scripts/update-qq-hot.js

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/miyu/qq-hot.json
          git diff --cached --quiet || git commit -m "update qq hot"
          git push
